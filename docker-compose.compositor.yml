version: '3.8'

services:
  page1:
    build: .
    image: page-stream:latest
    container_name: page1
    environment:
      - WIDTH=960
      - HEIGHT=1144
    volumes:
      - ./custom.js:/custom.js
      - ./custom.css:/custom.css
    command: >
      --ingest srt://page-stream-compositor:10001?streamid=page1
      --url "https://example.com/page1"
      --auto-refresh-seconds 1800
      --inject-css /custom.css
      --inject-js /custom.js
      --crop-infobar 64
    depends_on:
      compositor:
        condition: service_healthy
    networks:
      - compositor_net

  page2:
    build: .
    image: page-stream:latest
    container_name: page2
    environment:
      - WIDTH=960
      - HEIGHT=1144
    volumes:
      - ./custom.js:/custom.js
      - ./custom.css:/custom.css
    command: >
      --ingest srt://page-stream-compositor:10002?streamid=page2
      --url "https://example.com/page2"
      --auto-refresh-seconds 1800
      --inject-css /custom.css
      --inject-js /custom.js
      --crop-infobar 64
    depends_on:
      compositor:
        condition: service_healthy
    networks:
      - compositor_net

  compositor:
    build: .
    image: page-stream:latest
    container_name: page-stream-compositor
    environment:
      # Set COMPOSITOR_INGEST to your final ingest URI (SRT/RTMP/etc)
      - COMPOSITOR_INGEST=output.ts
    volumes:
      - ./out:/out
    # Optional: expose compositor listener ports to host for testing
    ports:
      - "10001:10001"
      - "10002:10002"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        mkdir -p /out &&
        echo "COMPOSITOR_INGEST=${COMPOSITOR_INGEST:-output.ts}" &&
        ffmpeg -hide_banner -loglevel info
        -i srt://0.0.0.0:10001?mode=listener
        -i srt://0.0.0.0:10002?mode=listener
        -filter_complex "[0:v]scale=960:1144[left];[1:v]scale=960:1144[right];[left][right]hstack=inputs=2[outv]"
        -map "[outv]" -map 0:a?
        -c:v libx264 -preset veryfast -b:v 4000k -maxrate 4500k -bufsize 8000k
        -c:a aac -b:a 128k
        -f mpegts "${COMPOSITOR_INGEST:-output.ts}"
    healthcheck:
      test: ["CMD-SHELL", "pgrep ffmpeg || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - compositor_net

networks:
  compositor_net:
    driver: bridge
